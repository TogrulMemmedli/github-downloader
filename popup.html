<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #24292f; margin: 0; }
    h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    input { width: 100%; box-sizing: border-box; padding: 6px 12px; font-size: 14px; margin-bottom: 12px; border: 1px solid #d0d7de; border-radius: 6px; outline: none; }
    input:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.3); }
    button { padding: 6px 16px; font-size: 14px; font-weight: 500; border-radius: 6px; cursor: pointer; border: 1px solid; transition: 0.2s; box-sizing: border-box; }
    .btn-group { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn-primary { flex: 1; color: #ffffff; background-color: #2da44e; border-color: rgba(27,31,36,0.15); }
    .btn-primary:hover { background-color: #2c974b; }
    .btn-danger { flex: 1; color: #cf222e; background-color: #f6f8fa; border-color: rgba(27,31,36,0.15); }
    .btn-danger:hover { background-color: #ffebe9; border-color: rgba(255,129,130,0.4); }
    .btn-donate { width: 100%; color: #24292f; background-color: #f6f8fa; border-color: rgba(27,31,36,0.15); margin-top: 12px; }
    .btn-donate:hover { background-color: #f3f4f6; }
    .status-msg { font-size: 13px; text-align: center; display: none; font-weight: 500; margin-top: 8px; }
    .success-text { color: #2da44e; }
    .danger-text { color: #cf222e; }
    .heart-text { color: #bf3989; margin-top: 16px; padding: 10px; background: #fff0f7; border-radius: 6px; }
  </style>
</head>
<body>
  <h3>⚙️ Settings</h3>
  
  <label>GitHub Personal Access Token</label>
  <input type="password" id="tokenInput" placeholder="ghp_...">
  
  <div class="btn-group">
    <button id="saveBtn" class="btn-primary">Save</button>
    <button id="deleteBtn" class="btn-danger">Delete</button>
  </div>
  <div id="saveStatus" class="status-msg"></div>

  <hr style="border:0; border-top:1px solid #d0d7de; margin: 20px 0 0 0;">

  <button id="donateBtn" class="btn-donate">💛 Support this project</button>
  <div id="thanksMsg" class="status-msg heart-text"></div>
  
  <script src="popup.js"></script>
</body>
</html>
